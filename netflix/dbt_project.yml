name: 'netflix'
version: '1.0.0'
config-version: 2

profile: 'netflix'

# Path configurations
model-paths:     ["models"]
analysis-paths:  ["analyses"]
test-paths:      ["tests"]
seed-paths:      ["seeds"]
macro-paths:     ["macros"]
snapshot-paths:  ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Global variable defaults (override with --vars '{"key": "value"}' on CLI)
vars:
  min_rating_count: 50       # minimum ratings threshold used in mart models
  min_relevance_score: 0.0   # genome score floor

# -----------------------------------------------------------------------
# Model materializations & tags
# -----------------------------------------------------------------------
models:
  netflix:
    +persist_docs:
      relation: true
      columns: true

    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    dim:
      +materialized: table
      +schema: dim
      +tags: ["dim"]

    fct:
      # Default is table; fct_ratings overrides to incremental in its own config block
      +materialized: table
      +schema: fct
      +tags: ["fct"]

    mart:
      +materialized: table
      +schema: mart
      +tags: ["mart"]

# -----------------------------------------------------------------------
# Seed configuration
# -----------------------------------------------------------------------
seeds:
  netflix:
    +schema: seeds
    seed_movie_release_dates:
      +column_types:
        movie_id: integer
        release_date: date

# -----------------------------------------------------------------------
# Snapshot configuration
# -----------------------------------------------------------------------
snapshots:
  netflix:
    +target_schema: snapshots
    +tags: ["snapshot"]
